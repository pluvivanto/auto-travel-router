<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>ATR POC - Interactive Visualization</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body { margin: 0; display: flex; height: 100vh; }
        aside { width: 350px; padding: 1rem; display: flex; flex-direction: column; border-right: 1px solid var(--pico-muted-border-color); }
        #map { flex-grow: 1; cursor: crosshair; z-index: 1; user-select: none; -webkit-user-select: none; }
        .info-box { font-size: 0.85rem; margin-bottom: 1rem; }
        footer { margin-top: auto; border-top: 1px solid var(--pico-muted-border-color); padding-top: 1rem; font-size: 0.9rem; }
        .hotel-icon { font-size: 24px; line-height: 1; display: flex; align-items: center; justify-content: center; background: none !important; border: none !important; }
    </style>
</head>
<body>
    <aside>
        <header>
            <h4 style="margin-bottom: 0.5rem">ATR Router POC</h4>
            <div class="info-box">
                <small>• Click map to add <b>POI</b><br>• Shift + Click to set <b>Hotel</b></small>
            </div>
        </header>
        <label>Hotel: <kbd id="hotelDisplay">Not Set</kbd></label>
        <label>POIs Selected: <b id="poiCount">0</b></label>
        <label for="numDays">Number of Days
            <input type="number" id="numDays" value="3" min="1" max="7">
        </label>
        <button id="runBtn">Run Optimization</button>
        <button id="clearBtn" class="secondary outline">Clear All</button>
        <div id="legend"></div>
        <footer>
            Latency: <code id="latency">-</code>
        </footer>
    </aside>
    <main id="map"></main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { boxZoom: false, zoomControl: false }).setView([52.5200, 13.4050], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let hotelPos = null, pois = [], hotelMarker = null;
        let tempMarkers = [], resultLayers = [];
        const colors = ['#e41a1c', '#377eb8', '#4daf4a', '#984ea3', '#ff7f00'];

        map.on('click', (e) => {
            const latlng = e.latlng;
            if (e.originalEvent.shiftKey) {
                if (hotelMarker) map.removeLayer(hotelMarker);
                hotelPos = { lat: latlng.lat, lon: latlng.lng };
                hotelMarker = L.marker([latlng.lat, latlng.lng], {
                    icon: L.divIcon({className: 'hotel-icon', html: '🏨', iconSize: [30, 30], iconAnchor: [15, 15]})
                }).addTo(map).bindPopup("Your Hotel Choice");
                document.getElementById('hotelDisplay').innerText = "Set";
            } else {
                pois.push({ lat: latlng.lat, lon: latlng.lng });
                const m = L.circleMarker([latlng.lat, latlng.lng], { radius: 6, color: '#666', weight: 1, fillOpacity: 0.5 }).addTo(map);
                tempMarkers.push(m);
                document.getElementById('poiCount').innerText = pois.length;
            }
        });

        const clearMap = () => {
            resultLayers.forEach(l => map.removeLayer(l));
            resultLayers = [];
        };

        document.getElementById('clearBtn').onclick = () => {
            pois = []; hotelPos = null; 
            if (hotelMarker) map.removeLayer(hotelMarker); hotelMarker = null;
            tempMarkers.forEach(m => map.removeLayer(m)); tempMarkers = [];
            clearMap();
            document.getElementById('poiCount').innerText = '0';
            document.getElementById('hotelDisplay').innerText = 'Not Set';
            document.getElementById('latency').innerText = '-';
        };

        document.getElementById('runBtn').onclick = async () => {
            if (!hotelPos || pois.length === 0) return alert("Please set a Hotel (Shift+Click) and at least one POI.");
            clearMap();

            try {
                const res = await fetch('/optimize', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hotel: hotelPos, numDays: parseInt(document.getElementById('numDays').value), pois: pois }) 
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('latency').innerText = parseFloat(res.headers.get('X-Response-Time')).toFixed(2) + ' ms';
                    
                    data.days.forEach((day, i) => {
                        const color = colors[i % colors.length];
                        
                        const poly = L.polyline(day.fullPath.map(p => [p.lat, p.lon]), {
                            color: color, weight: 5, opacity: 0.7
                        }).addTo(map);
                        resultLayers.push(poly);

                        day.sequence.forEach((p, idx) => {
                            const isEndpoint = (idx === 0 || idx === day.sequence.length - 1);
                            const marker = L.circleMarker([p.lat, p.lon], { 
                                radius: isEndpoint ? 4 : 7, 
                                fillColor: isEndpoint ? '#333' : color, 
                                color: "#fff", weight: 2, fillOpacity: 1 
                            }).addTo(map);
                            resultLayers.push(marker);
                        });
                    });
                }
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
